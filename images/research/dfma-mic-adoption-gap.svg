<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img" aria-labelledby="mic-title mic-desc">
  <title id="mic-title">Hospital MiC adoption gap</title>
  <desc id="mic-desc">Target hospital MiC adoption rises faster than actual and projected uptake from 2020 to 2029.</desc>
  <defs>
    <pattern id="gapStripe" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <rect width="8" height="8" fill="rgba(255,107,53,.04)"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#ff6b35" stroke-width="1.5" opacity=".14"/>
    </pattern>
    <pattern id="gapStripeHi" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <rect width="8" height="8" fill="rgba(255,107,53,.1)"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#ff6b35" stroke-width="1.5" opacity=".28"/>
    </pattern>
  </defs>
  <style>
    @media (prefers-reduced-motion: reduce) {
      .line-animate, .dot-animate, .legend-in, .gap-fill { animation: none !important; stroke-dashoffset: 0 !important; opacity: 1 !important; transform: none !important; }
      .year-hit .tip, .year-hit .year-band, .chart-body .line-target, .chart-body .line-actual, .chart-body .gap-fill { transition: none !important; }
    }
    .line-target { stroke-dashoffset: 0; }
    .line-actual { stroke-dashoffset: 0; stroke-dasharray: 9 7; }
    .gap-fill { opacity: 1; }
    .dot-animate { opacity: 1; transform: scale(1); transform-origin: center; transform-box: fill-box; }
    .run .line-animate.line-target { stroke-dasharray: 900; stroke-dashoffset: 900; animation: drawLine 1.1s ease forwards; }
    .run .line-animate.line-actual { animation: drawLineActual .85s .35s ease forwards; }
    .run .gap-fill { animation: gapIn .75s .7s ease backwards; }
    .run .dot-animate.d1 { animation: popIn .4s cubic-bezier(.2,.8,.2,1) backwards; animation-delay: .52s; }
    .run .dot-animate.d2 { animation: popIn .4s cubic-bezier(.2,.8,.2,1) backwards; animation-delay: .6s; }
    .run .dot-animate.d3 { animation: popIn .4s cubic-bezier(.2,.8,.2,1) backwards; animation-delay: .68s; }
    .run .dot-animate.d4 { animation: popIn .4s cubic-bezier(.2,.8,.2,1) backwards; animation-delay: .76s; }
    .run .dot-animate.d5 { animation: popIn .4s cubic-bezier(.2,.8,.2,1) backwards; animation-delay: .84s; }
    .run .legend-in { animation: legendIn .45s ease backwards; animation-delay: .95s; }
    @keyframes drawLine { from { stroke-dashoffset: 900; } to { stroke-dashoffset: 0; } }
    @keyframes drawLineActual { from { stroke-dasharray: 900; stroke-dashoffset: 900; } to { stroke-dasharray: 9 7; stroke-dashoffset: 0; } }
    @keyframes gapIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes popIn { from { opacity: 0; transform: scale(.35); } to { opacity: 1; transform: scale(1); } }
    @keyframes legendIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .chart-body .line-target, .chart-body .line-actual, .chart-body .gap-fill { transition: stroke-width .2s ease, fill .2s ease; }
    .chart-body:hover .line-target { stroke-width: 3.5; }
    .chart-body:hover .line-actual { stroke-width: 3.5; }
    .chart-body:hover .gap-fill { fill: url(#gapStripeHi); }
    .year-hit .hit { fill: transparent; cursor: pointer; }
    .year-hit .year-band { opacity: 0; transition: opacity .2s ease; }
    .year-hit .dot { transition: r .2s ease, fill .2s ease; }
    .year-hit .tip { opacity: 0; pointer-events: none; transition: opacity .2s ease, transform .2s ease; transform: translateY(4px); }
    .year-hit:hover .year-band { opacity: 1; }
    .year-hit:hover .dot { r: 6; fill: #ff6b35; }
    .year-hit:hover .tip { opacity: 1; transform: translateY(0); }
    .chart-body:hover .year-hit:not(:hover) .dot { opacity: .45; }
    .proj-hit { fill: transparent; cursor: pointer; }
    .proj-tip { opacity: 0; pointer-events: none; transition: opacity .2s ease; }
    .proj-wrap:hover .proj-tip { opacity: 1; }
    .proj-wrap:hover .proj-band { opacity: 1; }
    .proj-band { opacity: 0; transition: opacity .2s ease; fill: rgba(255,210,63,.12); }
  </style>
  <rect width="720" height="380" fill="#ffffff"/>
  <rect x="72" y="48" width="608" height="272" fill="#f5f5f5"/>
  <g font-family="Segoe UI,Roboto,Arial,sans-serif" font-size="11" font-weight="700" fill="#666" pointer-events="none">
    <line x1="72" y1="320" x2="680" y2="320" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="72" y1="48" x2="72" y2="320" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="72" y1="280" x2="680" y2="280" stroke="#e8e8e8" stroke-width="1"/>
    <line x1="72" y1="240" x2="680" y2="240" stroke="#e8e8e8" stroke-width="1"/>
    <line x1="72" y1="200" x2="680" y2="200" stroke="#e8e8e8" stroke-width="1"/>
    <line x1="72" y1="160" x2="680" y2="160" stroke="#e8e8e8" stroke-width="1"/>
    <line x1="72" y1="120" x2="680" y2="120" stroke="#e8e8e8" stroke-width="1"/>
    <line x1="72" y1="80" x2="680" y2="80" stroke="#e8e8e8" stroke-width="1"/>
    <text x="58" y="324" text-anchor="end" fill="#666">0</text>
    <text x="58" y="284" text-anchor="end" fill="#666">10</text>
    <text x="58" y="244" text-anchor="end" fill="#666">20</text>
    <text x="58" y="204" text-anchor="end" fill="#666">30</text>
    <text x="58" y="164" text-anchor="end" fill="#666">40</text>
    <text x="58" y="124" text-anchor="end" fill="#666">50</text>
    <text x="58" y="84" text-anchor="end" fill="#666">60</text>
  </g>
  <g font-family="Segoe UI,Roboto,Arial,sans-serif" font-size="10" font-weight="700" fill="#888" text-anchor="middle" pointer-events="none">
    <text x="88" y="342">2020</text><text x="152" y="342">2021</text><text x="216" y="342">2022</text>
    <text x="280" y="342">2023</text><text x="344" y="342">2024</text><text x="408" y="342">2025</text>
    <text x="472" y="342">2026</text><text x="536" y="342">2027</text><text x="600" y="342">2028</text>
    <text x="664" y="342">2029</text>
  </g>
  <g class="chart-body">
    <line x1="344" y1="48" x2="344" y2="320" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4" pointer-events="none"/>
    <text x="350" y="64" fill="#888" font-family="Segoe UI,Roboto,Arial,sans-serif" font-size="9" font-weight="700" pointer-events="none">Projected</text>
    <path class="gap-fill" fill="url(#gapStripe)" stroke="none" pointer-events="none" d="M344 230 L408 198 L472 170 L536 142 L600 126 L664 110 L664 320 L344 320 Z"/>
    <path class="line-animate line-target" fill="none" stroke="#0b0b0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" pointer-events="none" d="M88 300 L152 286 L216 272 L280 256 L344 240 L408 212 L472 180 L536 152 L600 136 L664 120"/>
    <path class="line-animate line-actual" fill="none" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" pointer-events="none" d="M88 308 L152 304 L216 296 L280 288 L344 280"/>
    <g class="year-hit">
      <rect class="year-band" x="72" y="48" width="32" height="272" fill="rgba(255,107,53,.07)" pointer-events="none"/>
      <circle class="dot dot-animate d1" cx="88" cy="308" r="4" fill="#ff6b35" stroke="#fff" stroke-width="2" pointer-events="none"/>
      <g class="tip" font-family="Segoe UI,Roboto,Arial,sans-serif" font-size="9" font-weight="700" pointer-events="none">
        <rect x="52" y="268" width="72" height="32" rx="3" fill="#0b0b0b"/><text x="88" y="282" text-anchor="middle" fill="#fff">2020</text><text x="88" y="294" text-anchor="middle" fill="#ffd23f">Actual 3%</text>
      </g>
      <rect class="hit" x="56" y="48" width="64" height="272"/>
    </g>
    <g class="year-hit">
      <rect class="year-band" x="136" y="48" width="32" height="272" fill="rgba(255,107,53,.07)" pointer-events="none"/>
      <circle class="dot dot-animate d2" cx="152" cy="304" r="4" fill="#ff6b35" stroke="#fff" stroke-width="2" pointer-events="none"/>
      <g class="tip" font-family="Segoe UI,Roboto,Arial,sans-serif" font-size="9" font-weight="700" pointer-events="none">
        <rect x="116" y="264" width="72" height="32" rx="3" fill="#0b0b0b"/><text x="152" y="278" text-anchor="middle" fill="#fff">2021</text><text x="152" y="290" text-anchor="middle" fill="#ffd23f">Actual 4%</text>
      </g>
      <rect class="hit" x="120" y="48" width="64" height="272"/>
    </g>
    <g class="year-hit">
      <rect class="year-band" x="200" y="48" width="32" height="272" fill="rgba(255,107,53,.07)" pointer-events="none"/>
      <circle class="dot dot-animate d3" cx="216" cy="296" r="4" fill="#ff6b35" stroke="#fff" stroke-width="2" pointer-events="none"/>
      <g class="tip" font-family="Segoe UI,Roboto,Arial,sans-serif" font-size="9" font-weight="700" pointer-events="none">
        <rect x="180" y="256" width="72" height="32" rx="3" fill="#0b0b0b"/><text x="216" y="270" text-anchor="middle" fill="#fff">2022</text><text x="216" y="282" text-anchor="middle" fill="#ffd23f">Actual 6%</text>
      </g>
      <rect class="hit" x="184" y="48" width="64" height="272"/>
    </g>
    <g class="year-hit">
      <rect class="year-band" x="264" y="48" width="32" height="272" fill="rgba(255,107,53,.07)" pointer-events="none"/>
      <circle class="dot dot-animate d4" cx="280" cy="288" r="4" fill="#ff6b35" stroke="#fff" stroke-width="2" pointer-events="none"/>
      <g class="tip" font-family="Segoe UI,Roboto,Arial,sans-serif" font-size="9" font-weight="700" pointer-events="none">
        <rect x="244" y="248" width="72" height="32" rx="3" fill="#0b0b0b"/><text x="280" y="262" text-anchor="middle" fill="#fff">2023</text><text x="280" y="274" text-anchor="middle" fill="#ffd23f">Actual 8%</text>
      </g>
      <rect class="hit" x="248" y="48" width="64" height="272"/>
    </g>
    <g class="year-hit">
      <rect class="year-band" x="328" y="48" width="32" height="272" fill="rgba(255,107,53,.07)" pointer-events="none"/>
      <circle class="dot dot-animate d5" cx="344" cy="280" r="4" fill="#ff6b35" stroke="#fff" stroke-width="2" pointer-events="none"/>
      <g class="tip" font-family="Segoe UI,Roboto,Arial,sans-serif" font-size="9" font-weight="700" pointer-events="none">
        <rect x="300" y="240" width="88" height="32" rx="3" fill="#0b0b0b"/><text x="344" y="254" text-anchor="middle" fill="#fff">2024</text><text x="344" y="266" text-anchor="middle" fill="#ffd23f">Actual 10%</text>
      </g>
      <rect class="hit" x="312" y="48" width="64" height="272"/>
    </g>
    <g class="proj-wrap">
      <rect class="proj-band" x="344" y="48" width="336" height="272" pointer-events="none"/>
      <g class="proj-tip" font-family="Segoe UI,Roboto,Arial,sans-serif" font-size="9" font-weight="700" pointer-events="none">
        <rect x="430" y="58" width="120" height="28" rx="3" fill="#0b0b0b"/>
        <text x="490" y="72" text-anchor="middle" fill="#fff">2025-2029 projected</text>
        <text x="490" y="82" text-anchor="middle" fill="#ccc">Gap vs target widens</text>
      </g>
      <rect class="proj-hit" x="376" y="48" width="304" height="272"/>
    </g>
  </g>
  <g class="legend-in" font-family="Segoe UI,Roboto,Arial,sans-serif" font-size="10" font-weight="700" fill="#666" pointer-events="none">
    <line x1="24" y1="19" x2="34" y2="19" stroke="#0b0b0b" stroke-width="2.5" stroke-linecap="round"/>
    <text x="40" y="23">Target hospital MiC adoption (%)</text>
    <line x1="268" y1="19" x2="288" y2="19" stroke="#ff6b35" stroke-width="2.5" stroke-dasharray="8 6"/>
    <text x="294" y="23">Actual / projected adoption (%)</text>
  </g>
</svg>
